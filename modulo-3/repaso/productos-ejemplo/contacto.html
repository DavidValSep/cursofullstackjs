<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/mediaQuery.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="validaciones.js" defer></script>
  </head>
  <body>
    <header id="header-home">
      <!-- agregamos nav de bootstrap -->
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container my-4">
          <a class="navbar-brand" href="#">Ejemplo store</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse text-white" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"
                  >Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Productos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contacto.html">Contacto</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
<!-- mensaje  -->
    <div id="liveAlertPlaceholder" class="container col-md-3"></div>
    
     <!-- formulario -->
    <main class="main-container container mt-5 col-10 col-md-3 col-xs-4 my-4 border">
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Nombre</label>
        <input
          type="text"
          class="form-control"
          id="nombre"
          placeholder="Tu nombre"
        />
      </div>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Correo</label>
        <input
          type="email"
          class="form-control"
          id="correo"
          placeholder="name@example.com"
        />
      </div>
      <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label"
          >Mensaje</label
        >
        <textarea class="form-control" id="mensaje" rows="3"></textarea>
      </div>

      <button onclick="validarFormulario()" id="liveAlertBtn" type="button" class="btn btn-primary mt-3">
        Enviar
      </button>
    </main>
    <footer>
      <p>Ejemplo Store &copy; 2026</p>
    </footer>
  </body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajo OPractico DOM</title>
    <script src="app.js"></script>
</head>
<body>
    <h3>1. Repetir Palabras</h3>
    <hr />
    <label for="palabra">Palabra:</label>
    <input type="text" id="palabra" />
    <br />
    <label for="veces">Cantidad:</label>
    <input type="number" id="veces" />
    <button onClick="repetirPalabra()">Repetir</button>
    <div id="resultado1"></div>
    <h3>2. Aplicar Color</h3>
    <hr />
    <input type="color" id="color2" />
    <p id="parrafo2">Este es un parrafo de texto.</p>
    <button onClick="aplicarColor()">Aplicar Color</button>

    <h3>3. Calcular numeros</h3>
    <hr />
    <p>
        <label for="num1">Ingrese un número:</label> 
        <input type="number" id="num1" /> 
    </p>

    <p> 
        <label for="num2">Ingrese otro número:</label>
        <input type="number" id="num2" />
    </p>
    <button onclick="calcular()">Calcular</button>
    <div id="resultado3"></div> 

    
    

    <h3>4. Invertir texto</h3>
    <label for="texto4">Ingrese un texto:</label>
    <input type="text" id="texto4" />
    <button onclick="invertirTexto()">Invertir</button>
    <div id="resultado4"></div>

</body>
</html>
